server {
    listen 80;
    server_name localhost
    root /usr/share/nginx/html
    index index.html

    # all requests -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

     # catching for static files
     location ~* \.(js|css|png|jpg|gif|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

}