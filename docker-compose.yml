#version: '3.9'
# Sleepy Durian World - Facial recognition Time Recording
# Start: docker-compose up --build
# Stop: docker-compose down
# Start some new: docker-compose down -v && docker-compose up--build

services:
  # PostgreSQL database
  database:
    image: pgvector/pgvector:pg15 #postgres:15-alpine
    container_name: sd_database
    restart: always
    environment:
      POSTGRES_DB: sd_timerecording
      POSTGRES_USER: sd_admin
      POSTGRES_PASSWORD: sd_secret_6868
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sd_admin -d sd_timerecording']
      interval: 5s
      timeout: 5s
      retries: 10

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sd_backend
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sd_admin:sd_secret_6868@database:5432/sd_timerecording
      THRESHOLD: '0.45'
      ANTI_SPAM_SEC: '30'
      LOG_LEVEL: 'INFO'
    volumes:
      - ./data:/app/data
    ports:
      - '8000:8000'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Web Dashboard (nginx)
  dashboard:
    image: nginx:alpine
    container_name: sd_dashboard
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  db_data:
    name: sd_db_data




